<!DOCTYPE html>
<html lang="ko" style="color-scheme:dark;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#020817">
<title>RadReport Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;500;600;700&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --fs-xs:clamp(8px,0.7vw,10px);
    --fs-sm:clamp(10px,0.85vw,12px);
    --fs-md:clamp(12px,1vw,14px);
    --fs-lg:clamp(14px,1.2vw,16px);
    --fs-xl:clamp(20px,2vw,28px);
    --fs-2xl:clamp(24px,2.5vw,36px);
    --sp-xs:clamp(4px,0.4vw,6px);
    --sp-sm:clamp(8px,0.7vw,12px);
    --sp-md:clamp(12px,1vw,18px);
    --sp-lg:clamp(16px,1.4vw,24px);
    --sp-xl:clamp(20px,1.8vw,32px);
    --left-panel:clamp(290px,29vw,440px);
    --radius:clamp(8px,0.8vw,14px);
    --accent:#22d3ee;
    --accent2:#818cf8;
    --green:#4ade80;
    --amber:#fbbf24;
    --red:#f87171;
    --tr-border:border-color 0.2s ease,box-shadow 0.2s ease;
    --tr-btn:transform 0.2s ease,box-shadow 0.2s ease,background 0.2s ease,color 0.2s ease;
    --tr-ui:background 0.2s ease,color 0.2s ease,border-color 0.2s ease;
  }
  body{background:#020817;color:#94a3b8;font-family:'Sora','IBM Plex Sans KR',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:var(--fs-md);min-height:100vh;overflow-x:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
  @keyframes glow{0%,100%{box-shadow:0 0 20px rgba(34,211,238,0.2);}50%{box-shadow:0 0 40px rgba(34,211,238,0.4);}}
  @media(prefers-reduced-motion:reduce){
    *{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important;}
  }
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.15);border-radius:4px;}
  input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5);cursor:pointer;}
  select{background-color:#0f172a;color:#f1f5f9;}
  select option{background:#0f172a;color:#f1f5f9;}
  .field-input{
    background:rgba(0,0,0,0.3);
    border:1px solid rgba(148,163,184,0.1);
    color:#f1f5f9;
    font-family:'Sora','IBM Plex Sans KR',system-ui,sans-serif;
    font-size:var(--fs-md);
    padding:var(--sp-xs) var(--sp-sm);
    border-radius:8px;
    outline:none;
    transition:var(--tr-border);
    width:100%;
  }
  .field-input:focus-visible{border-color:var(--accent);box-shadow:0 0 0 3px rgba(34,211,238,0.18);}
  .field-input::placeholder{color:#475569;}
  .btn-primary{
    background:linear-gradient(135deg,#0891b2 0%,#22d3ee 100%);
    color:#020817;border:none;
    font-family:'JetBrains Mono',monospace;
    font-weight:800;letter-spacing:2px;cursor:pointer;
    transition:var(--tr-btn);border-radius:var(--radius);
  }
  .btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 30px rgba(34,211,238,0.35);}
  .btn-primary:focus-visible{outline:2px solid var(--accent);outline-offset:3px;}
  .btn-primary:disabled{background:rgba(34,211,238,0.1);color:#475569;cursor:not-allowed;transform:none;box-shadow:none;border:1px solid rgba(148,163,184,0.1);}
  .panel{background:rgba(15,23,42,0.85);backdrop-filter:blur(16px);border:1px solid rgba(148,163,184,0.1);border-radius:var(--radius);}
  .tab-btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px;transition:var(--tr-ui);}
  .tab-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .icon-btn{display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.15s ease,color 0.15s ease,background 0.15s ease;}
  .icon-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  textarea.field-input{resize:vertical;line-height:1.7;}
  @media(max-aspect-ratio:3/4){:root{--left-panel:clamp(260px,32vw,400px);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useRef,useEffect}=React;

/* ── CONSTANTS ─────────────────────────────── */
const BODY_PARTS={
  "Head / Neck":["Brain","Neck","Orbit","Temporal Bone","Paranasal Sinus"],
  "Spine":["C-spine","T-spine","L-spine","Whole Spine"],
  "Chest / Abdomen":["Chest","Abdomen","Pelvis","Abdomen & Pelvis"],
  "Upper Extremity":["Shoulder","Elbow","Wrist","Hand","Finger"],
  "Lower Extremity":["Hip","Knee","Ankle","Foot","Toe"],
  "Other":["Whole Body","Breast"],
};
const MODALITIES=["CT","MRI","X-ray","Ultrasound","PET-CT","Mammography","Fluoroscopy"];
const FORMAT_OPTIONS=[{value:"structured",icon:"⊞",label:"STRUCTURED"},{value:"narrative",icon:"≡",label:"NARRATIVE"},{value:"bullet",icon:"∷",label:"BULLET"}];
const TONE_OPTIONS=[{value:"formal",label:"FORMAL"},{value:"concise",label:"CONCISE"},{value:"detailed",label:"DETAILED"},{value:"clinical",label:"CLINICAL"}];
const URGENCY_OPTIONS=[{value:"routine",label:"Routine",color:"#4ade80"},{value:"urgent",label:"Urgent",color:"#fbbf24"},{value:"critical",label:"Critical",color:"#f87171"}];
const CONTRAST_OPTIONS={
  CT:[{value:"non-contrast",label:"Non-Contrast"},{value:"contrast",label:"+ Contrast"},{value:"both",label:"Both Phases"}],
  MRI:[{value:"non-contrast",label:"Non-Contrast"},{value:"gadolinium",label:"+ Gadolinium"}],
};
const SEX_OPTIONS=["선택 안 함","남성 (M)","여성 (F)"];

const C={
  bg:"#020817",surface:"rgba(15,23,42,0.85)",surface2:"rgba(30,41,59,0.5)",
  border:"rgba(148,163,184,0.1)",borderHover:"rgba(34,211,238,0.35)",
  accent:"#22d3ee",accent2:"#818cf8",
  accentDim:"rgba(34,211,238,0.12)",accentGlow:"rgba(34,211,238,0.25)",
  text:"#94a3b8",dim:"#475569",bright:"#f1f5f9",
  green:"#4ade80",greenDim:"rgba(74,222,128,0.12)",
  amber:"#fbbf24",red:"#f87171",
};
const mono="'JetBrains Mono',monospace";
const sans="'Sora','IBM Plex Sans KR',system-ui,sans-serif";

/* ── HELPERS ─────────────────────────────── */
function breakSentences(text){
  if(!text)return"";
  let r=text.replace(/\.\s+([A-Z])/g,".\n$1");
  r=r.replace(/(다|음|됨|임|함|없음|있음|요)\.\s+/g,"$1.\n");
  r=r.replace(/\.\s+([가-힣])/g,".\n$1");
  return r;
}

/* ── SMALL UI COMPONENTS ─────────────────── */
function GridBg(){
  return(
    <svg style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0,opacity:0.6}} xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
          <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(34,211,238,0.05)" strokeWidth="0.5"/>
        </pattern>
        <radialGradient id="fade" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stopColor="white" stopOpacity="1"/>
          <stop offset="100%" stopColor="white" stopOpacity="0"/>
        </radialGradient>
        <mask id="mask"><rect width="100%" height="100%" fill="url(#fade)"/></mask>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)" mask="url(#mask)"/>
      {/* accent orbs */}
      <ellipse cx="15%" cy="20%" rx="200" ry="200" fill="rgba(34,211,238,0.03)"/>
      <ellipse cx="85%" cy="70%" rx="250" ry="250" fill="rgba(129,140,248,0.03)"/>
    </svg>
  );
}

function Divider({label,color}){
  const c=color||C.dim;
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,margin:"4px 0"}}>
      <div style={{flex:1,height:"1px",background:`linear-gradient(to right,${c}30,transparent)`}}/>
      <span style={{fontFamily:mono,fontSize:"var(--fs-xs)",color:c,letterSpacing:2,fontWeight:700}}>{label}</span>
      <div style={{flex:1,height:"1px",background:`linear-gradient(to left,${c}30,transparent)`}}/>
    </div>
  );
}

function Field({label,children,hint,accent}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <label style={{fontFamily:mono,fontSize:"var(--fs-xs)",color:accent?C.accent:C.dim,letterSpacing:1.5,fontWeight:700}}>{label}</label>
        {hint&&<span style={{fontFamily:mono,fontSize:9,color:C.dim,opacity:0.6}}>{hint}</span>}
      </div>
      {children}
    </div>
  );
}

function Tag({children,color,active,onClick}){
  const c=color||C.accent;
  return(
    <button onClick={onClick} style={{
      padding:"4px 10px",borderRadius:20,
      border:`1px solid ${active?c:C.border}`,
      background:active?`${c}20`:"transparent",
      color:active?c:C.dim,
      fontFamily:mono,fontSize:10,fontWeight:700,letterSpacing:0.8,
      cursor:"pointer",transition:"all 0.15s",whiteSpace:"nowrap",
    }}>{children}</button>
  );
}

function SegBtn({options,value,onChange,small}){
  return(
    <div style={{display:"flex",background:"rgba(0,0,0,0.35)",borderRadius:8,padding:3,border:`1px solid ${C.border}`,gap:2}}>
      {options.map(opt=>{
        const active=value===opt.value;
        return(
          <button key={opt.value} onClick={()=>onChange(opt.value)} style={{
            flex:1,padding:small?"5px 6px":"7px 10px",borderRadius:6,border:"none",cursor:"pointer",
            fontFamily:mono,fontSize:small?9:10,fontWeight:700,letterSpacing:1,
            transition:"all 0.2s",
            background:active?C.accent:"transparent",
            color:active?C.bg:C.dim,
            boxShadow:active?`0 2px 8px ${C.accentGlow}`:"none",
          }}>
            {opt.icon&&<span style={{marginRight:4}}>{opt.icon}</span>}{opt.label}
          </button>
        );
      })}
    </div>
  );
}

function ReportSection({title,children,highlight}){
  return(
    <div style={{marginBottom:22}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <div style={{width:3,height:14,background:highlight||C.accent,borderRadius:2,boxShadow:`0 0 10px ${highlight||C.accentGlow}`}}/>
        <span style={{fontFamily:mono,fontSize:"var(--fs-xs)",color:highlight||C.accent,letterSpacing:2,fontWeight:700}}>{title}</span>
      </div>
      {children}
    </div>
  );
}

function Spinner(){
  const steps=["임상 정보 분석 중...","영상 소견 처리 중...","리포트 생성 중...","최종 검토 중..."];
  const [step,setStep]=useState(0);
  useEffect(()=>{
    const t=setInterval(()=>setStep(s=>(s+1)%steps.length),1400);
    return()=>clearInterval(t);
  },[]);
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24,minHeight:320}}>
      <div style={{position:"relative",width:56,height:56}}>
        <div style={{position:"absolute",inset:0,border:`1px solid ${C.border}`,borderRadius:"50%"}}/>
        <div style={{position:"absolute",inset:0,border:"2px solid transparent",borderTopColor:C.accent,borderRadius:"50%",animation:"spin 0.9s linear infinite"}}/>
        <div style={{position:"absolute",inset:6,border:"1px solid transparent",borderTopColor:C.accent2,borderRadius:"50%",animation:"spin 1.3s linear infinite reverse"}}/>
        <div style={{position:"absolute",inset:"50%",transform:"translate(-50%,-50%)",width:6,height:6,borderRadius:"50%",background:C.accent,boxShadow:`0 0 12px ${C.accentGlow}`}}/>
      </div>
      <div style={{textAlign:"center",animation:"fadeIn 0.3s ease"}}>
        <p style={{fontFamily:mono,fontSize:11,color:C.accent,letterSpacing:2,animation:"pulse 1.4s ease-in-out infinite"}}>{steps[step]}</p>
        <p style={{fontFamily:mono,fontSize:9,color:C.dim,marginTop:6,letterSpacing:1}}>Gemini AI 분석 중…</p>
      </div>
    </div>
  );
}

/* ── BADGE ─── */
function StatusBadge({ok}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:20,
      border:`1px solid ${ok?C.green:C.red}`,background:ok?C.greenDim:"rgba(248,113,113,0.08)"}}>
      <div style={{width:6,height:6,borderRadius:"50%",background:ok?C.green:C.red,
        boxShadow:`0 0 6px ${ok?C.green:C.red}`,animation:ok?"glow 2s ease-in-out infinite":"none"}}/>
      <span style={{fontFamily:mono,fontSize:9,fontWeight:700,color:ok?C.green:C.red,letterSpacing:1}}>
        {ok?"READY":"NO KEY"}
      </span>
    </div>
  );
}

/* ── MAIN APP ─────────────────────────────── */
function App(){
  const examDate=new Date().toISOString().split("T")[0];
  const [apiKey,setApiKey]=useState("");
  const [modality,setModality]=useState("CT");
  const [contrast,setContrast]=useState("non-contrast");
  const [selCat,setSelCat]=useState("Chest / Abdomen");
  const [bodypart,setBodypart]=useState("Chest");
  const [indication,setIndication]=useState("");
  const [clinicalInfo,setClinicalInfo]=useState("");
  const [finding,setFinding]=useState("");
  const [format,setFormat]=useState("structured");
  const [tone,setTone]=useState("clinical");
  const [urgency,setUrgency]=useState("routine");
  const [lang,setLang]=useState("ko");
  const [radiologist,setRadiologist]=useState("");
  const [hospital,setHospital]=useState("");
  // NEW fields
  const [patientAge,setPatientAge]=useState("");
  const [patientSex,setPatientSex]=useState("선택 안 함");
  const [patientId,setPatientId]=useState("");

  const [differentialDx,setDifferentialDx]=useState("");
  const [keyMeasurements,setKeyMeasurements]=useState("");
  const [activeTab,setActiveTab]=useState("input");
  const [history,setHistory]=useState(()=>{
    try{const s=localStorage.getItem("radreport_history");return s?JSON.parse(s):[];}
    catch{return[];}
  });
  useEffect(()=>{
    try{localStorage.setItem("radreport_history",JSON.stringify(history));}
    catch(e){console.warn("localStorage 저장 실패:",e);}
  },[history]);
  const deleteHistory=(id)=>setHistory(h=>h.filter(item=>item.id!==id));
  const clearHistory=()=>{setHistory([]);localStorage.removeItem("radreport_history");};

  const [loading,setLoading]=useState(false);
  const [report,setReport]=useState(null);
  const [error,setError]=useState(null);
  const [copied,setCopied]=useState(false);
  const [showModal,setShowModal]=useState(false);
  const modalTextRef=useRef(null);

  const [selectedModel,setSelectedModel]=useState("gemini-2.5-flash");
  const [availableModels,setAvailableModels]=useState([]);
  const apiOk=apiKey.startsWith("AIza");

  const fetchModels=useCallback(async(key)=>{
    if(!key.startsWith("AIza"))return;
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
      const data=await res.json();
      if(data.models){
        const chat=data.models.filter(m=>m.supportedGenerationMethods?.includes("generateContent")).map(m=>m.name.replace("models/","")).filter(m=>m.startsWith("gemini"));
        setAvailableModels(chat);
        const preferred=["gemini-2.5-flash","gemini-2.5-pro","gemini-2.0-flash","gemini-1.5-flash","gemini-1.5-pro"];
        const best=preferred.find(p=>chat.includes(p))||chat[0];
        if(best)setSelectedModel(best);
      }
    }catch(e){}
  },[]);

  const contrastOptions=CONTRAST_OPTIONS[modality]||null;
  const handleModalityChange=(val)=>{setModality(val);setContrast("non-contrast");};
  const getContrastLabel=()=>contrastOptions?.find(o=>o.value===contrast)?.label||"";

  /* ── ORGAN MAP ── */
  const organMap={
    "Chest":          {ko:"폐,흉막,심장,심낭,종격동,기관지,대동맥,횡격막,흉벽,뼈",en:"Lungs,Pleura,Heart,Pericardium,Mediastinum,Trachea & Bronchi,Aorta,Diaphragm,Chest Wall,Bones"},
    "Abdomen":        {ko:"간,담낭,담도,췌장,비장,부신,신장,장,복막,혈관,뼈",en:"Liver,Gallbladder,Bile Ducts,Pancreas,Spleen,Adrenal Glands,Kidneys,Bowel,Peritoneum,Vessels,Bones"},
    "Pelvis":         {ko:"방광,자궁/난소 또는 전립선,직장,골반혈관,뼈",en:"Bladder,Uterus/Ovaries or Prostate,Rectum,Pelvic Vessels,Bones"},
    "Abdomen & Pelvis":{ko:"간,담낭,췌장,비장,신장,방광,장,복막,혈관,뼈",en:"Liver,Gallbladder,Pancreas,Spleen,Kidneys,Bladder,Bowel,Peritoneum,Vessels,Bones"},
    "Brain":          {ko:"뇌실질,뇌실,뇌구/회,백질,뇌간,소뇌,두개골,부비동,안와",en:"Brain Parenchyma,Ventricles,Sulci & Gyri,White Matter,Brainstem,Cerebellum,Skull,Sinuses,Orbits"},
    "Neck":           {ko:"갑상선,림프절,혈관,연부조직",en:"Thyroid,Lymph Nodes,Vessels,Soft Tissue"},
    "C-spine":        {ko:"추체,추간판,척수관,신경공,척추주변연부조직",en:"Vertebral Bodies,Disc Spaces,Spinal Canal,Neural Foramina,Paraspinal Soft Tissue"},
    "T-spine":        {ko:"추체,추간판,척수관,신경공,척추주변연부조직",en:"Vertebral Bodies,Disc Spaces,Spinal Canal,Neural Foramina,Paraspinal Soft Tissue"},
    "L-spine":        {ko:"추체,추간판,척수원뿔,신경공,척추주변연부조직",en:"Vertebral Bodies,Disc Spaces,Spinal Canal,Neural Foramina,Paraspinal Soft Tissue"},
    "Knee":           {ko:"골구조물,관절강,연골,반월판,인대,연부조직",en:"Bones,Joint Space,Cartilage,Menisci,Ligaments,Soft Tissue"},
    "Shoulder":       {ko:"골구조물,회전근개,관절순,관절강,점액낭",en:"Bones,Rotator Cuff,Labrum,Joint Space,Bursa"},
    "Hip":            {ko:"골구조물,관절연골,관절강,연부조직",en:"Bones,Articular Cartilage,Joint Space,Soft Tissue"},
  };

  /* ── GENERATE ── */
  const generate=useCallback(async()=>{
    if(!apiOk){setError("Gemini API 키를 입력해주세요 (AIza...)");return;}
    if(!finding.trim()){setError("Findings를 입력해주세요.");return;}
    setLoading(true);setError(null);setReport(null);

    const isKo=lang==="ko";
    const isXray=modality==="X-ray";
    const organs=organMap[bodypart]?.[isKo?"ko":"en"]||(isKo?"뼈,연부조직":"Bones,Soft Tissue");
    const contrastStr=contrastOptions?getContrastLabel():"N/A";
    const patientCtx=[
      patientId&&`Patient ID: ${patientId}`,
      patientAge&&`Age: ${patientAge}`,
      patientSex!=="선택 안 함"&&`Sex: ${patientSex}`,
    ].filter(Boolean).join(" | ");
    const measCtx=keyMeasurements?`\nKey Measurements: ${keyMeasurements}`:"";
    const ddxCtx=differentialDx?`\nClinician's DDx: ${differentialDx}`:"";

    const langInstr=isKo
      ?"Korean (한국어). Write ALL content in Korean."
      :"English. Write ALL content in English.";

    const xraySystem=`You are an expert radiologist. Generate a concise X-ray report.
Language: ${langInstr}
Tone: ${tone} | Urgency: ${urgency}
Merge Findings and Impression into ONE concise "summary" (2–4 sentences max).
${urgency!=="routine"?`urgency_note: ONLY the key diagnosis name(s), no explanation.`:`urgency_note: null`}
recommendation: ${urgency!=="routine"?"Brief follow-up recommendation.":"null"}
Return ONLY raw JSON, no markdown:
{"technique":"string","summary":"string","urgency_note":${urgency!=="routine"?'"string"':"null"},"recommendation":${urgency!=="routine"?'"string"':"null"}}`;

    const mainSystem=`You are an expert radiologist assistant. Generate a professional radiology report in JSON.
Format: ${format} | Tone: ${tone} | Urgency: ${urgency}
Language: ${langInstr}
Contrast: ${contrastStr} — reflect accurately in technique.
${tone==="concise"?"CONCISE MODE: 1 short sentence per organ. Impression: specific diagnosis per finding.":""}
${format==="structured"
  ?`"findings" MUST be array: [{"organ":"...","finding":"..."}]. Use organs for ${bodypart}: ${organs}. Include ALL.${tone==="concise"?" Omit normal organs not mentioned in raw input.":""}`
  :format==="bullet"
  ?`"findings" is a plain string. Each item on its own NEW LINE starting with •. Never combine multiple items on one line.`
  :`"findings" is a single flowing prose paragraph. Do NOT use arrays or bullet points.`}

COMPARISON RULE (very important):
- Scan the Raw Findings carefully for ANY mention of a prior/previous study, comparison imaging, or past dates.
- This includes phrases like: "이전 CT", "prior MRI", "compared to", "previous study", "2023", "2024년", specific dates, "이전 검사", "전회", "last exam", "f/u", "follow-up", "이전 대비", "compared with", etc.
- If any such reference is found, extract it into "comparison" as a clean, standalone sentence describing what prior study is being compared and on what date (if mentioned). Write in the report language (${isKo?"Korean":"English"}).
- If the Comparison Study field below is also provided, incorporate that date into the comparison sentence.
- If NO prior study is mentioned anywhere, set "comparison": null.
- NEVER include comparison language inside "findings" — move it exclusively to "comparison".

${urgency!=="routine"?`urgency_note: ONLY key diagnosis name(s). No sentences, just terms.`:`urgency_note: null`}
recommendation: ${urgency!=="routine"?"Clinical follow-up recommendation.":"null — set to null"}
"impression" MUST always be a JSON array of strings.
Return ONLY raw JSON:
{"technique":"string","comparison":"string or null","findings":${format==="structured"?`[{"organ":"...","finding":"..."}]`:'"string"'},"impression":["..."],"urgency_note":${urgency!=="routine"?'"string"':"null"},"recommendation":${urgency!=="routine"?'"string"':"null"}}`;

    const userMsg=`Modality: ${modality}
Body Part: ${bodypart}
Exam Date: ${examDate}
Contrast: ${contrastStr}
Urgency: ${urgency}
${patientCtx?`Patient: ${patientCtx}`:""}
${indication?"Clinical Indication: "+indication:""}
Clinical Information: ${clinicalInfo||"Not provided"}
${measCtx}${ddxCtx}
${radiologist?"Radiologist: "+radiologist:""}
${hospital?"Hospital: "+hospital:""}

Raw Findings:
${finding}

Generate a professional radiology report as JSON.`;

    try{
      const url=`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`;
      const res=await fetch(url,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          systemInstruction:{parts:[{text:isXray?xraySystem:mainSystem}]},
          contents:[{role:"user",parts:[{text:userMsg}]}],
          generationConfig:{maxOutputTokens:1500,temperature:0.3},
        }),
      });
      const data=await res.json();
      if(!res.ok)throw new Error(data.error?.message||JSON.stringify(data));
      const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
      let clean=raw.replace(/```json\s*/gi,"").replace(/```/g,"").trim();
      const si=clean.indexOf("{");const ei=clean.lastIndexOf("}");
      if(si!==-1&&ei!==-1)clean=clean.slice(si,ei+1);
      let parsed;
      try{parsed=JSON.parse(clean);}
      catch{
        parsed=isXray
          ?{technique:`X-ray ${bodypart}`,summary:raw,recommendation:null}
          :{technique:`${modality} of ${bodypart}`,comparison:isKo?"이전 검사 없음":"No prior studies",findings:raw,impression:[isKo?"임상 소견과 비교 검토 요망.":"Correlate clinically."],recommendation:null};
      }
      if(isXray){
        if(!parsed.summary) parsed.summary=parsed.findings?(Array.isArray(parsed.findings)?parsed.findings.map(f=>f.finding||String(f)).join(" "):String(parsed.findings)):(isKo?"소견을 확인하세요.":"Please review findings.");
      } else {
        if(format==="structured"){
          if(!Array.isArray(parsed.findings)) parsed.findings=[{organ:isKo?"소견":"Findings",finding:String(parsed.findings||"")}];
        } else {
          if(typeof parsed.findings!=="string") parsed.findings=Array.isArray(parsed.findings)?parsed.findings.map(f=>f.finding||String(f)).join("\n"):(isKo?"소견을 확인하세요.":"Please review findings.");
        }
        if(!Array.isArray(parsed.impression)) parsed.impression=parsed.impression?[String(parsed.impression)]:[isKo?"임상 소견과 비교 검토 요망.":"Correlate clinically."];
      }
      setReport(parsed);
      // save to history
      setHistory(h=>[{
        id:Date.now(),date:examDate,modality,bodypart,
        patientId:patientId||"—",urgency,lang,report:parsed,
      },...h.slice(0,49)]);
    }catch(e){
      setError("오류: "+e.message);
    }finally{
      setLoading(false);
    }
  },[apiKey,apiOk,selectedModel,finding,clinicalInfo,indication,modality,contrast,bodypart,examDate,format,tone,urgency,lang,radiologist,hospital,patientAge,patientSex,patientId,differentialDx,keyMeasurements]);

      if(Array.isArray(report.findings)){
        findingsText=report.findings.map(f=>`${f.organ}: ${f.finding}`).join("\n");
      } else { findingsText=breakSentences(report.findings||""); }
      const imp=Array.isArray(report.impression)
        ?report.impression.length===1?report.impression[0]:report.impression.map((l,i)=>`${i+1}. ${l}`).join("\n")
        :(report.impression||"");
      text=`${findingsText}\n\n${isKo?"결론":"IMPRESSION"}:\n${imp}`;
    }
    if(urgency!=="routine"){
      if(report.urgency_note&&report.urgency_note!=="null") text+=`\n\n${urgency.toUpperCase()} NOTE:\n${report.urgency_note}`;
      if(report.recommendation&&report.recommendation!=="null") text+=`\n\nRECOMMENDATION:\n${report.recommendation}`;
    }
    return text;
  };

                    <Field label="FORMAT">
                      {modality==="X-ray"
                        ?<div className="field-input" style={{opacity:0.4,cursor:"default",userSelect:"none"}}><span style={{fontFamily:mono,fontSize:11,color:C.dim}}>N/A for X-ray</span></div>
                        :<SegBtn options={FORMAT_OPTIONS} value={format} onChange={setFormat}/>
                      }
                    </Field>
                    <Field label="TONE">
                      <SegBtn options={TONE_OPTIONS} value={tone} onChange={setTone} small/>
                    </Field>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      <Field label="RADIOLOGIST">
                        <input className="field-input" name="radiologist" autoComplete="name" value={radiologist} onChange={e=>setRadiologist(e.target.value)} placeholder="김영상 (전문의)…"/>
                      </Field>
                      <Field label="HOSPITAL / DEPT">
                        <input className="field-input" name="hospital" autoComplete="organization" value={hospital} onChange={e=>setHospital(e.target.value)} placeholder="서울대학교병원…"/>
                      </Field>
                    </div>
                  </div>
                </div>

                {error&&(
                  <div style={{padding:"12px 16px",borderRadius:10,background:"rgba(248,113,113,0.08)",border:"1px solid rgba(248,113,113,0.25)",color:C.red,fontFamily:mono,fontSize:11,lineHeight:1.6}}>
                    ⚠ {error}
                  </div>
                )}

                <button onClick={generate} disabled={loading||!apiOk} className="btn-primary" aria-busy={loading} style={{padding:"var(--sp-sm) var(--sp-lg)",fontSize:"var(--fs-sm)"}}>
                  {loading?"ANALYZING…":"⟶  Generate Report"}
                </button>
              </>
            )}
          </div>

          {/* RIGHT PANEL — REPORT OUTPUT */}
          <div className="panel" style={{overflow:"hidden",minHeight:"clamp(500px,72vh,920px)"}}>
            {/* Report Header */}
            <div style={{padding:"18px 24px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(0,0,0,0.2)"}}>
              <div>
                <div style={{fontFamily:mono,fontSize:"var(--fs-xs)",color:C.dim,letterSpacing:2,marginBottom:3}}>OUTPUT REPORT</div>
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <span style={{fontFamily:"'Sora',sans-serif",fontSize:"var(--fs-lg)",fontWeight:600,color:C.bright}}>
                    {modality}{contrastOptions?` · ${getContrastLabel()}`:""} · {bodypart}
                  </span>
                  {urgency!=="routine"&&(()=>{
                    const uc=URGENCY_OPTIONS.find(u=>u.value===urgency);
                    return(
                      <span style={{padding:"2px 10px",borderRadius:20,border:`1px solid ${uc.color}`,color:uc.color,fontFamily:mono,fontSize:9,fontWeight:700,letterSpacing:1,background:`${uc.color}10`}}>
                        ● {urgency.toUpperCase()}
                      </span>
                    );
                  })()}
                  {patientId&&<span style={{fontFamily:mono,fontSize:9,color:C.dim}}>ID: {patientId}</span>}
                  {patientAge&&<span style={{fontFamily:mono,fontSize:9,color:C.dim}}>{patientAge}세{patientSex!=="선택 안 함"?" · "+patientSex:""}</span>}
                </div>
                {hospital&&<div style={{fontFamily:mono,fontSize:10,color:C.dim,marginTop:3}}>{hospital}{radiologist?" · "+radiologist:""}</div>}
              </div>
              {report&&(
                <button aria-label={copied?"복사 완료":"리포트 복사"} onClick={copyReport} style={{
                  padding:"8px 16px",borderRadius:8,cursor:"pointer",
                  background:copied?C.greenDim:C.accentDim,
                  border:`1px solid ${copied?C.green:C.accent}`,
                  color:copied?C.green:C.accent,
                  fontFamily:mono,fontSize:"var(--fs-xs)",fontWeight:700,letterSpacing:1,transition:"background 0.2s ease,color 0.2s ease,border-color 0.2s ease",
                }}>
                  {copied?"✓ COPIED":"⊕ COPY"}
                </button>
              )}
            </div>

            <div style={{padding:26}} aria-live="polite" aria-atomic="false">
              {!report&&!loading&&(
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"clamp(300px,42vh,520px)",gap:20}}>
                  <div style={{width:64,height:64,borderRadius:16,background:"rgba(34,211,238,0.06)",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>⚕</div>
                  <div style={{textAlign:"center"}}>
                    <p style={{fontFamily:"'Sora',sans-serif",fontSize:16,color:C.bright,marginBottom:6,fontWeight:600}}>Ready to Generate</p>
                    <p style={{fontFamily:mono,fontSize:11,color:C.dim,letterSpacing:0.5}}>Findings를 입력하고 Generate를 누르세요…</p>
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center"}}>
                    {["Claude AI 분석","한/영 자동 번역","구조화된 출력","히스토리 저장"].map(f=>(
                      <span key={f} style={{fontFamily:mono,fontSize:9,color:C.dim,border:`1px solid ${C.border}`,padding:"4px 10px",borderRadius:20}}>{f}</span>
                    ))}
                  </div>
                </div>
              )}

              {loading&&<Spinner/>}

              {report&&!loading&&(
                <div style={{animation:"fadeIn 0.4s ease"}}>
                  {/* Meta bar */}
                  <div style={{display:"flex",gap:16,marginBottom:20,padding:"10px 14px",background:"rgba(0,0,0,0.25)",borderRadius:10,border:`1px solid ${C.border}`,flexWrap:"wrap"}}>
                    {[
                      ["DATE",examDate],
                      ["MODALITY",modality],
                      ...(contrastOptions?[["CONTRAST",getContrastLabel()]]:[]),
                      ["REGION",bodypart],
                      ["FORMAT",format.toUpperCase()],
                      ["LANG",lang==="ko"?"한국어":"ENG"],
                      ...(patientAge?[["AGE",patientAge+"세"]]:[]),
                    ].map(([k,v])=>(
                      <div key={k}>
                        <div style={{fontFamily:mono,fontSize:"var(--fs-xs)",color:C.dim,letterSpacing:1.5,marginBottom:2}}>{k}</div>
                        <div style={{fontFamily:mono,fontSize:"var(--fs-sm)",color:C.bright,fontWeight:700}}>{v}</div>
                      </div>
                    ))}
                  </div>

                  {report.technique&&(
                    <ReportSection title="TECHNIQUE">
                      <p style={{lineHeight:1.8,color:C.text,fontSize:"var(--fs-md)",whiteSpace:"pre-wrap"}}>{breakSentences(report.technique)}</p>
                    </ReportSection>
                  )}
                  {report.comparison&&report.comparison!=="null"&&!/^(none|없음|no prior|not available|unavailable)\.?$/i.test(report.comparison.trim())&&(
                    <ReportSection title="COMPARISON">
                      <div style={{padding:"12px 16px",borderRadius:10,background:"rgba(129,140,248,0.06)",border:`1px solid rgba(129,140,248,0.25)`}}>
                        {/* 날짜 패턴 감지해서 배지로 강조 */}
                        {(()=>{
                          const text=report.comparison;
                          const datePattern=/(\d{4}[-./년]\s*\d{1,2}[-./월]?\s*\d{0,2}일?|\d{4}-\d{2}-\d{2})/g;
                          const dates=[...new Set(text.match(datePattern)||[])];
                          return(
                            <div style={{display:"flex",flexDirection:"column",gap:8}}>
                              {dates.length>0&&(
                                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:2}}>
                                  {dates.map((d,i)=>(
                                    <span key={i} style={{fontFamily:mono,fontSize:9,color:C.accent2,background:"rgba(129,140,248,0.15)",border:`1px solid rgba(129,140,248,0.35)`,padding:"2px 8px",borderRadius:10,letterSpacing:0.5}}>
                                      📅 {d}
                                    </span>
                                  ))}
                                  <span style={{fontFamily:mono,fontSize:9,color:C.dim,padding:"2px 8px",background:"rgba(0,0,0,0.25)",borderRadius:10,border:`1px solid ${C.border}`}}>
                                    자동 감지
                                  </span>
                                </div>
                              )}
                              <p style={{lineHeight:1.85,color:C.bright,fontSize:"var(--fs-md)",whiteSpace:"pre-wrap"}}>{text}</p>
                            </div>
                          );
                        })()}
                      </div>
                    </ReportSection>
                  )}

                  {modality==="X-ray"?(
                    <ReportSection title={lang==="ko"?"판독 소견":"REPORT SUMMARY"} highlight={C.accent}>
                      <div style={{padding:"16px 18px",borderRadius:10,background:"rgba(34,211,238,0.04)",border:`1px solid ${C.borderHover}`}}>
                        <p style={{lineHeight:1.9,color:C.bright,fontSize:"var(--fs-md)",whiteSpace:"pre-wrap"}}>{breakSentences(report.summary||"")}</p>
                      </div>
                    </ReportSection>
                  ):(
                    <>
                      <ReportSection title="FINDINGS">
                        {Array.isArray(report.findings)?(
                          <div style={{display:"flex",flexDirection:"column",gap:0,borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}>
                            {report.findings.map((f,i)=>(
                              <div key={i} style={{display:"grid",gridTemplateColumns:"130px 1fr",borderBottom:i<report.findings.length-1?`1px solid ${C.border}`:"none",background:i%2===0?"rgba(0,0,0,0.18)":"rgba(0,0,0,0.06)"}}>
                                <div style={{padding:"var(--sp-xs) var(--sp-sm)",borderRight:`1px solid ${C.border}`,fontFamily:mono,fontSize:"var(--fs-sm)",fontWeight:700,color:C.accent,display:"flex",alignItems:"center"}}>{f.organ}</div>
                                <div style={{padding:"var(--sp-xs) var(--sp-sm)",fontSize:"var(--fs-md)",lineHeight:1.7,color:C.bright}}>{f.finding}</div>
                              </div>
                            ))}
                          </div>
                        ):format==="bullet"?(
                          <div style={{display:"flex",flexDirection:"column",gap:8}}>
                            {(report.findings||"").replace(/([^\n])\s*•\s*/g,"$1\n").replace(/([^\n])\s*-\s+/g,"$1\n").split("\n").map(l=>l.replace(/^[•\-\*]\s*/,"").trim()).filter(l=>l.length>0).map((text,i)=>(
                              <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                                <span style={{color:C.accent,fontWeight:700,fontSize:16,lineHeight:1.4,flexShrink:0}}>•</span>
                                <p style={{lineHeight:1.8,color:C.bright,fontSize:"var(--fs-md)"}}>{text}</p>
                              </div>
                            ))}
                          </div>
                        ):(
                          <p style={{lineHeight:1.9,color:C.bright,fontSize:"var(--fs-md)",whiteSpace:"pre-wrap"}}>{breakSentences(report.findings||"")}</p>
                        )}
                      </ReportSection>

                      <ReportSection title="IMPRESSION" highlight={C.accent2}>
                        <div style={{display:"flex",flexDirection:"column",gap:10}}>
                          {Array.isArray(report.impression)
                            ?report.impression.map((line,i)=>(
                              <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                                <div style={{width:22,height:22,borderRadius:6,background:"rgba(129,140,248,0.15)",border:`1px solid ${C.accent2}50`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                                  <span style={{fontFamily:mono,fontSize:10,fontWeight:800,color:C.accent2}}>{i+1}</span>
                                </div>
                                <p style={{lineHeight:1.7,color:C.bright,fontSize:"var(--fs-md)",paddingTop:1}}>{line}</p>
                              </div>
                            ))
                            :<p style={{lineHeight:1.9,color:C.bright,fontSize:"var(--fs-md)",whiteSpace:"pre-wrap"}}>{report.impression}</p>
                          }
                        </div>
                      </ReportSection>
                    </>
                  )}

                  {report.urgency_note&&report.urgency_note!=="null"&&(()=>{
                    const uc=URGENCY_OPTIONS.find(u=>u.value===urgency);
                    const col=uc?.color||C.amber;
                    return(
                      <div style={{padding:"12px 16px",borderRadius:10,background:`${col}08`,border:`1px solid ${col}30`,marginBottom:20}}>
                        <div style={{fontFamily:mono,fontSize:9,color:col,letterSpacing:2,fontWeight:700,marginBottom:6}}>{urgency.toUpperCase()} NOTE</div>
                        <p style={{color:col,fontSize:urgency==="critical"||urgency==="urgent"?16:13,fontWeight:urgency==="critical"||urgency==="urgent"?800:400,fontFamily:urgency==="critical"||urgency==="urgent"?mono:sans,lineHeight:1.5}}>{report.urgency_note}</p>
                      </div>
                    );
                  })()}

                  {report.recommendation&&report.recommendation!=="null"&&(
                    <ReportSection title="RECOMMENDATION">
                      <p style={{lineHeight:1.8,color:C.text,fontSize:"var(--fs-md)",whiteSpace:"pre-wrap"}}>{report.recommendation}</p>
                    </ReportSection>
                  )}

                  <div style={{marginTop:20,paddingTop:16,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                    <span style={{fontFamily:mono,fontSize:"var(--fs-xs)",color:C.dim}}>{radiologist?"Interpreted by: "+radiologist:"For clinical review only"}</span>
                    <span style={{fontFamily:mono,fontSize:"var(--fs-xs)",color:C.dim}}>{new Date().toLocaleString("ko-KR")}</span>
                    <div style={{fontFamily:mono,fontSize:"var(--fs-xs)",color:C.green,border:`1px solid ${C.green}40`,padding:"3px 10px",borderRadius:4,letterSpacing:1,background:C.greenDim}}>✓ FINAL REPORT</div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
